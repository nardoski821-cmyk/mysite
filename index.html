<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Invitation</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #dbe3eb; font-family: 'Georgia', serif; overflow: hidden; perspective: 1000px; }
        .envelope-container { position: relative; width: 360px; height: 520px; cursor: pointer; }
        .envelope-back { position: absolute; width: 100%; height: 380px; bottom: 0; background: linear-gradient(135deg, #2b5c8f 0%, #1e4570 100%); border-radius: 8px; box-shadow: 0 30px 60px rgba(0,0,0,0.35); z-index: 1; overflow: hidden; }
        .envelope-pocket { position: absolute; bottom: 0; left: 0; width: 100%; height: 240px; background: linear-gradient(0deg, #183b63 0%, #224c7a 100%); clip-path: polygon(0 40%, 50% 0, 100% 40%, 100% 100%, 0 100%); z-index: 3; }
        .envelope-flap { position: absolute; top: 140px; left: 0; width: 100%; height: 145px; background: linear-gradient(180deg, #2a5a8c 0%, #1d436e 100%); clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 4; transform-origin: top center; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease; }
        
        .butterfly-wrapper { position: absolute; top: 240px; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 80px; height: 80px; z-index: 10; opacity: 1; transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s ease; pointer-events: none; }
        .butterfly { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        .wing { position: absolute; width: 40px; height: 70px; top: 5px; background: radial-gradient(circle at center, #6cb2f2 10%, #1e62a6 70%, #0a2545 100%); border-radius: 50% 50% 30% 40%; box-shadow: 0 0 15px rgba(108, 178, 242, 0.6); }
        .wing-left { left: 0; transform-origin: right center; animation: flapLeft 0.15s infinite alternate ease-in-out; }
        .wing-right { right: 0; transform-origin: left center; border-radius: 50% 50% 40% 30%; animation: flapRight 0.15s infinite alternate ease-in-out; }
        .butterfly-body { position: absolute; left: 38px; top: 15px; width: 4px; height: 45px; background: #051324; border-radius: 2px; }

        /* کارتێ ڕێکخست بۆ ناڤەراستێ */
        .invitation-card { position: absolute; top: 20px; left: 50%; width: 330px; height: 480px; background: #ffffff; border-radius: 6px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 1px solid #d4c3b3; padding: 30px 25px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; opacity: 0; transform: translateX(-50%) translateY(100px) scale(0.85); transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 1s ease; box-sizing: border-box; }
        
        .nav-button { margin-top: 20px; padding: 10px 25px; background-color: #1b365d; color: white; border: none; border-radius: 5px; cursor: pointer; font-family: 'Georgia', serif; font-size: 14px; }
        
        .envelope-container.active .envelope-flap { transform: rotateX(150deg); opacity: 0; }
        .envelope-container.active .butterfly-wrapper { transform: translate(-50%, -420px) scale(1.6); opacity: 0; }
        .envelope-container.active .invitation-card { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); z-index: 20; }
        
        @keyframes flapLeft { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(65deg); } }
        @keyframes flapRight { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(-65deg); } }
    </style>
</head>
<body>

    <div class="envelope-container" id="mainContainer">
        <div class="invitation-card">
            <div class="card-title" style="font-size: 28px; color: #1b365d;">Narinj & Ramazan</div>
            <div class="card-divider" style="width: 60px; height: 1px; background: #c3a673; margin: 15px 0;"></div>
            <p class="card-details" style="font-size: 14px; color: #555555; line-height: 1.8;">
                ئه ز حه شته دكم ژ هه مي تشتي پتر<br>
                ئەڤە سوپرایزەکا تایبەتە یا من بۆ تە جێکری، دا تنێ بزانی هەبوونا تە د ژیانا من دا هەمی تشتە<br><br>
                <span style="color: #c3a673; font-weight: bold;">من دفيت هه رده م خو دگه ل ئيك و بێي ئيك تو بهيي و سه حكي ئه في سايتي بجيك يي من جيكري جنكي دي مه تيدا بيني</span><br>
                Hame kase mn🫀
            </p>
            <button class="nav-button" onclick="window.location.href='nare7.html'">بینینا وێنەیان</button>
        </div>

        <div class="butterfly-wrapper">
            <div class="butterfly">
                <div class="wing wing-left"></div>
                <div class="butterfly-body"></div>
                <div class="wing wing-right"></div>
            </div>
        </div>

        <div class="envelope-flap"></div>
        <div class="envelope-pocket"></div>
        <div class="envelope-back"></div>
    </div>

    <script>
        const container = document.getElementById('mainContainer');
        container.addEventListener('click', function() {
            if(!this.classList.contains('active')) { this.classList.add('active'); }
        });
    </script>
</body>
</html>
